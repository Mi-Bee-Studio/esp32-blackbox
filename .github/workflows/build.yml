# ESP32 Blackbox CI/CD
# Builds firmware for ESP32-C3 and ESP32-C6 targets.
# - Push to main / PR: CI build check with artifact upload
# - Tag push (v*): CI build + GitHub Release with firmware binaries

name: Build ESP32 Firmware

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Build job — runs for both targets in parallel via matrix strategy
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    container: espressif/idf:release-v6.0

    strategy:
      matrix:
        target: [esp32c3, esp32c6]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set target and build firmware
        run: |
          . $IDF_PATH/export.sh
          idf.py set-target ${{ matrix.target }}
          idf.py build

      - name: Rename firmware binaries with target suffix
        run: |
          TARGET="${{ matrix.target }}"

          cp build/esp32-blackbox.bin "esp32-blackbox-${TARGET}.bin"
          cp build/bootloader/bootloader.bin "bootloader-${TARGET}.bin"
          cp build/partition_table/partition-table.bin "partition-table-${TARGET}.bin"

          echo "=== Firmware files ==="
          ls -lh "esp32-blackbox-${TARGET}.bin" \
                 "bootloader-${TARGET}.bin" \
                 "partition-table-${TARGET}.bin"

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.target }}
          path: |
            esp32-blackbox-${{ matrix.target }}.bin
            bootloader-${{ matrix.target }}.bin
            partition-table-${{ matrix.target }}.bin
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Release job — creates a GitHub Release with all firmware binaries
  # Only runs on version tag pushes (v*)
  # ---------------------------------------------------------------------------
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all firmware artifacts
        uses: actions/download-artifact@v4
        with:
          path: firmware
          merge-multiple: true

      - name: List release assets
        run: ls -lh firmware/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## ESP32 Blackbox ${{ github.ref_name }}

            ### Supported Boards
            - **ESP32-C3** — ESP32-C3 SuperMini (Nologo)
            - **ESP32-C6** — Seeed Studio XIAO ESP32C6

            ### Flashing
            ```bash
            # ESP32-C3
            esptool.py --chip esp32c3 -p COM3 -b 460800 write_flash \
              0x0 bootloader-esp32c3.bin \
              0x8000 partition-table-esp32c3.bin \
              0x10000 esp32-blackbox-esp32c3.bin

            # ESP32-C6
            esptool.py --chip esp32c6 -p COM3 -b 460800 write_flash \
              0x0 bootloader-esp32c6.bin \
              0x8000 partition-table-esp32c6.bin \
              0x10000 esp32-blackbox-esp32c6.bin
            ```
          files: |
            firmware/esp32-blackbox-esp32c3.bin
            firmware/bootloader-esp32c3.bin
            firmware/partition-table-esp32c3.bin
            firmware/esp32-blackbox-esp32c6.bin
            firmware/bootloader-esp32c6.bin
            firmware/partition-table-esp32c6.bin
